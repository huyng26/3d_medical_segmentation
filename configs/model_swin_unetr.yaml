# Swin UNETR model configuration (MONAI wrapper)
model: swin_unetr

architecture:
  in_channels: 1
  out_channels: null    # filled from dataset config at runtime
  img_size: [128, 128, 64]    # must match patch_size in train_default.yaml
  feature_size: 48
  drop_rate: 0.0
  attn_drop_rate: 0.0
  dropout_path_rate: 0.0
  use_checkpoint: true  # gradient checkpointing to reduce VRAM usage

pretrained:
  # Path or URL to publicly available Swin UNETR pretrained weights
  # Leave null to train from scratch
  weights_path: null
