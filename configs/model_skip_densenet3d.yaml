# SkipDenseNet3D model configuration
model: skip_densenet3d

architecture:
  in_channels: 1
  out_channels: null    # filled from dataset config at runtime
  growth_rate: 16       # k — channels added per dense layer
  block_config: [4, 4, 4, 4]   # dense layers per encoder block
  bottleneck_factor: 4  # 1x1x1 conv before each dense layer: 4*k channels
  compression: 0.5      # transition layer compression factor
  norm: batch
  activation: relu
