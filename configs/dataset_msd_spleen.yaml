# MSD Task09 — Spleen segmentation configuration
dataset: msd_spleen
msd_task: Task09_Spleen

paths:
  data_dir: data/MSD/Task09_Spleen

# 0 = background, 1 = spleen
num_classes: 2
label_names:
  0: background
  1: spleen

preprocessing:
  hu_clip_min: -175
  hu_clip_max: 250
  target_spacing: [1.5, 1.5, 2.0]
  normalize: zscore

splits:
  json_list: dataset.json
